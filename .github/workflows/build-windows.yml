name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE (PyInstaller)
        shell: cmd
        run: |
          REM Use --collect-all to include package metadata/resources for streamlit and importlib_metadata
          pyinstaller --noconfirm --onefile ^
            --collect-all streamlit ^
            --collect-all importlib_metadata ^
            --add-data "thresholds.json;." ^
            --add-data "data;data" ^
            --name "DGA-Assistant" run_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DGA-Assistant-exe
          path: dist/DGA-Assistant.exe
